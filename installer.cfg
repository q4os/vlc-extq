#***q4os*setup*config*header*do*not*delete*it***#

TEMPLATES_DIR_0="$TEMPLATESDIR0"
TEMPLATES_DIR="setup_templates"
#OUT_DIR="../setup_out"

#CHKINSTALL_COMMAND="cp -r filesystem/* /"
CHKINSTALL_COMMAND="true"
INSTALL_PREFIX="/"
SETUP_TYPE="2"
Q4VER_MIN="3.0"
# Q4VER_MAX="3.9999"
# PREPACK_SH="1"
CHK_INET="1"
PK_NAME="q4os-vlc"
APPNAME_DESC="VLC media player"
PK_VERS="3.4"
PK_RELEASE="a1"

#?vlc-plugin-notify,..
#codecs - see ipcodecs-extq deps
MCODECS="va-driver-all, ffmpeg, twolame, libaacs0, libfaad2, libfaac0t64 | libfaac0, libmp3lame0, libdvdnav4, libdvdread8t64 \| libdvdread8 \| libdvdread7 \| libdvdread4, libbluray2, libcrystalhd3, libopencore-amrwb0, libopencore-amrnb0"
GCODECS="gstreamer0.10-plugins-good, gstreamer0.10-plugins-bad, gstreamer0.10-plugins-ugly, gstreamer1.0-plugins-good, gstreamer1.0-plugins-bad, gstreamer1.0-plugins-ugly, gstreamer1.0-libav" #loads gtk deps
PK_RECOMMENDS="$MCODECS" ##?$GCODECS

PK_PRE_DEPENDS="vlc"
PK_DEPENDS="libc6, q4os-desktop \(\>= 3.0\), $PK_PRE_DEPENDS"

APPLNK_ENTRY="0"
# DESKTOP_ENTRY="0"
# MENU_ENTRY="0"
# REG_ENTRY="0"
# UNINSTALL_ENTRY="0"
# APP_ICON="vlc"
# APP_LINK="vlc"
UNINST_ADPCKS="vlc"
INCLUDE_DEBS="0"
PK_MAINTAINER="q4os@q4os.org"
PK_ARCH="all"
